---
name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detection de secrets (GitLeaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Installer Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Formatage (black)
        run: black --check src/ tests/

      - name: Linting (ruff)
        run: ruff check src/ tests/

      - name: Scan dependances (pip-audit)
        run: pip-audit -r requirements.txt

      - name: Sécurité (bandit)
        run: bandit -r src/ -ll

      - name: Sécurité (semgrep)
        run: semgrep --config auto --error src/

      - name: Tests + couverture
        run: |
          pytest --cov=src \
          --cov-report=term \
          --cov-report=html:coverage-report \
          --cov-fail-under=70 \
          -v

      - name: Générer rapport couverture XML
        run: pytest --cov=src --cov-report=xml -v

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@55e44800a8f495208cce6e4e82f5dedb45fcf0ef
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Sauvegarder le rapport
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage-report/
